name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Extract version
        run: |
          $date = Get-Date -Format "yyyy.MM.dd"
          $tag = "v$date"
          "VERSION=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Toolchain
        run: rustup default stable-msvc

      - name: Set version in Cargo.toml
        run: |
          $files = @(
              './Cargo.toml'
              './yas/Cargo.toml'
              './genshin/Cargo.toml'
              './application/Cargo.toml'
          )
          # Convert calver v2026.03.12 to valid semver: 20260312.0.0
          # Cargo requires 3-part semver; pack YYYYMMDD into major
          $d = Get-Date -Format "yyyyMMdd"
          $ver = "$d.0.0"
          [regex]$pattern = '(?<=version = ").*(?=")'
          foreach ($file in $files) {
              $pattern.Replace((Get-Content -Raw $file), $ver, 1) | Out-File -FilePath $file
          }

      - name: Build (Release)
        run: cargo build --release

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GOODScanner_${{ env.VERSION }}
          path: target/release/GOODScanner.exe

      - name: Delete existing release if any
        run: gh release delete $env:VERSION --yes --cleanup-tag 2>$null
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: target/release/GOODScanner.exe
          make_latest: true
